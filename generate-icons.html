<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Generator - Meet Caption Translator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #4285f4;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      margin-bottom: 20px;
    }
    button {
      background: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover {
      background: #3367d6;
    }
    .preview {
      margin-top: 30px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .preview canvas {
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .status {
      margin-top: 20px;
      padding: 10px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 Icon Generator</h1>
    <p>Generate icons for Meet Caption Translator extension</p>
    
    <button onclick="generateIcons()">Generate & Download Icons</button>
    <button onclick="previewIcons()">Preview Icons</button>
    
    <div class="preview" id="preview"></div>
    <div class="status" id="status">Icons generated! Check your downloads folder.</div>
  </div>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#4285f4');
      gradient.addColorStop(1, '#34a853');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      
      // Globe circle
      ctx.strokeStyle = 'white';
      ctx.lineWidth = Math.max(2, size / 20);
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 3, 0, Math.PI * 2);
      ctx.stroke();
      
      // Horizontal lines (latitude)
      ctx.beginPath();
      ctx.moveTo(size / 6, size / 2);
      ctx.lineTo(size * 5 / 6, size / 2);
      ctx.stroke();
      
      // Vertical arc (longitude)
      ctx.beginPath();
      ctx.ellipse(size / 2, size / 2, size / 8, size / 3, 0, 0, Math.PI * 2);
      ctx.stroke();
      
      // Caption bars (bottom)
      const barHeight = size / 12;
      const barY = size * 0.75;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.fillRect(size * 0.15, barY, size * 0.7, barHeight);
      ctx.fillRect(size * 0.15, barY + barHeight * 1.5, size * 0.5, barHeight);
    }

    function generateIcons() {
      const sizes = [16, 48, 128];
      let downloaded = 0;
      
      sizes.forEach(size => {
        const canvas = document.createElement('canvas');
        drawIcon(canvas, size);
        
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `icon${size}.png`;
          a.click();
          URL.revokeObjectURL(url);
          
          downloaded++;
          if (downloaded === sizes.length) {
            document.getElementById('status').style.display = 'block';
            setTimeout(() => {
              document.getElementById('status').style.display = 'none';
            }, 3000);
          }
        });
      });
    }

    function previewIcons() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '<strong>Preview:</strong>';
      
      const sizes = [16, 48, 128];
      sizes.forEach(size => {
        const canvas = document.createElement('canvas');
        drawIcon(canvas, size);
        
        const wrapper = document.createElement('div');
        wrapper.style.textAlign = 'center';
        
        const label = document.createElement('div');
        label.textContent = `${size}x${size}`;
        label.style.fontSize = '12px';
        label.style.color = '#666';
        label.style.marginTop = '5px';
        
        wrapper.appendChild(canvas);
        wrapper.appendChild(label);
        preview.appendChild(wrapper);
      });
    }

    // Auto preview on load
    window.addEventListener('load', previewIcons);
  </script>
</body>
</html>
