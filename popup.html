<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet Caption Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌐 Caption Translator</h1>
      <p class="subtitle">Translate Google Meet captions</p>
    </header>

    <section class="section">
      <h2>Status</h2>
      <div class="status-display">
        <span id="status-text">Inactive</span>
        <span id="status-indicator" class="indicator inactive"></span>
      </div>
    </section>

    <section class="section">
      <h2>Control</h2>
      <div class="button-group">
        <button id="start-btn" class="btn btn-primary">Start</button>
        <button id="stop-btn" class="btn btn-secondary">Stop</button>
      </div>
    </section>

    <section class="section">
      <h2>Translation Settings</h2>
      
      <div class="form-group">
        <label for="source-lang">Source Language:</label>
        <select id="source-lang" class="select">
          <option value="auto">Auto Detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
        </select>
      </div>

      <div class="form-group">
        <label for="target-lang">Target Language:</label>
        <select id="target-lang" class="select">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="ja" selected>Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="ru">Russian</option>
        </select>
      </div>

      <div class="form-group">
        <label for="translate-behavior">Translate Window:</label>
        <select id="translate-behavior" class="select">
          <option value="update" selected>Update Existing Tab</option>
          <option value="newtab">Always New Tab</option>
          <option value="popup">Popup Window</option>
        </select>
      </div>
    </section>

    <section class="section">
      <h2>Auto-Run Settings</h2>
      
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="auto-run-enabled">
          Enable auto-run for saved meetings
        </label>
      </div>

      <div class="form-group">
        <label for="meeting-url">Meeting URL:</label>
        <input type="text" id="meeting-url" class="input" placeholder="https://meet.google.com/xxx-yyyy-zzz">
        <button id="add-url-btn" class="btn btn-small">Add URL</button>
      </div>

      <div id="saved-urls" class="saved-urls">
        <!-- URLs will be added here dynamically -->
      </div>
    </section>

    <section class="section">
      <h2>Actions</h2>
      <button id="clear-history-btn" class="btn btn-secondary">Clear Caption History</button>
      <button id="open-translate-btn" class="btn btn-secondary">Open Google Translate</button>
    </section>

    <footer>
      <p class="note">⚠️ Make sure to enable captions in Google Meet</p>
    </footer>
  </div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
